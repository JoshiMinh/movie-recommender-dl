name: Training

on:
  push:

permissions:
  contents: write

jobs:
  train-and-commit:
    if: ${{ !contains(github.event.head_commit.message, '[skip-training]') && github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run training
        run: |
          python -c "from main import run_training; from src.settings import DEFAULTS; run_training(dataset=DEFAULTS.dataset, model_override=DEFAULTS.model, optimizer_override=DEFAULTS.optimizer, device_override='cpu')"

      - name: Verify artifact parity
        run: |
          python - <<'PY'
          from pathlib import Path
          expected = {'rnn_adam.pth', 'lstm_adam.pth', 'gru_adam.pth'}
          root = Path('artifacts/ml-1m')
          found = {p.name for p in root.glob('*.pth')}
          missing = sorted(expected - found)
          if missing:
              raise SystemExit(f'Missing checkpoints: {missing}')
          for name in expected:
              meta = root / f"{name.replace('.pth', '')}_metadata.json"
              if not meta.exists():
                  raise SystemExit(f'Missing metadata: {meta}')
          print('Artifact parity check passed.')
          PY

      - name: Commit artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add artifacts/
          if git diff --cached --quiet; then
            echo "No artifact changes to commit."
            exit 0
          fi
          git commit -m "ci: update training artifacts [skip-training]"
          git push
